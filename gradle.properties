# Project-wide Gradle settings
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Kotlin
kotlin.code.style=official

# Android
android.useAndroidX=true

# Enables non-transitive R classes (рекомендуется Google для больших проектов)
android.nonTransitiveRClass=true

# Включает параллельную сборку
org.gradle.parallel=true
org.gradle.caching=true

# Отключает проверку пути на не-ASCII символы (путь содержит кириллицу)
android.overridePathCheck=true

# Подавляем предупреждение об AGP 8.5.2 + compileSdk 35
android.suppressUnsupportedCompileSdk=35
